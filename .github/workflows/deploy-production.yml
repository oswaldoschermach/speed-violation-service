name: Deploy Production

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS (SSH)
    if: >
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success') &&
      vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH (git pull + compose pull + up)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH }}"
            git pull --ff-only
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi
            COMPOSE="-f docker/prod/compose.yaml --env-file docker/prod/.env"
            if ! docker inspect -f '{{.State.Running}}' speed-violation-postgres-prod 2>/dev/null | grep -q true; then
              docker ps -aq --filter "name=speed-violation-postgres" | xargs -r docker rm -f
              $DC $COMPOSE up -d postgres
              for i in $(seq 1 30); do
                if docker inspect -f '{{.State.Health.Status}}' speed-violation-postgres-prod 2>/dev/null | grep -q healthy; then
                  break
                fi
                sleep 2
              done
            fi
            $DC $COMPOSE up -d --no-recreate caddy 2>/dev/null || $DC $COMPOSE up -d caddy
            $DC $COMPOSE pull app
            docker rm -f speed-violation-app-prod 2>/dev/null || true
            $DC $COMPOSE up -d --no-deps app
            for i in $(seq 1 45); do
              if docker inspect -f '{{.State.Health.Status}}' speed-violation-app-prod 2>/dev/null | grep -q healthy; then
                break
              fi
              sleep 2
            done
            curl -fsS http://127.0.0.1:8080/actuator/health/readiness
            docker image prune -f
