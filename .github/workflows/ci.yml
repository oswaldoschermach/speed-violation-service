name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

env:
  JAVA_VERSION: "21"
  IMAGE_LOCAL_TAG: speed-violation-service:ci
  IMAGE_GHCR: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: 1 · Build (compile)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Compile sources and test classes
        run: chmod +x mvnw && ./mvnw -B --no-transfer-progress -DskipTests compile test-compile

  unit-tests:
    name: 2 · Unit tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run unit tests
        run: ./mvnw -B --no-transfer-progress test

  smoke-tests:
    name: 3 · Smoke tests (Maven)
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run smoke tests
        run: ./mvnw -B --no-transfer-progress test -Dgroups=smoke -DexcludedGroups=

  integration-tests:
    name: 4 · Integration tests + coverage gate
    needs: smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run integration tests + JaCoCo gate
        run: ./mvnw -B --no-transfer-progress verify -DskipUnitTests=true

      - name: Upload JaCoCo report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: error

      - name: Upload Failsafe reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: target/failsafe-reports
          if-no-files-found: ignore

  sonar:
    name: 5 · Sonar analysis
    needs: integration-tests
    if: vars.SONAR_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Download JaCoCo XML
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Compile
        run: chmod +x mvnw && ./mvnw -B -DskipTests compile test-compile

      - name: Disable Automatic Analysis (CI-only)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          HTTP=$(curl -s -o /tmp/sonar-autoscan.json -w '%{http_code}' -X POST \
            'https://sonarcloud.io/api/autoscan/activation' \
            -u "${SONAR_TOKEN}:" \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode 'enable=false' \
            --data-urlencode 'projectKey=oswaldoschermach_speed-violation-service')
          if [[ "$HTTP" != "204" && "$HTTP" != "200" ]]; then
            cat /tmp/sonar-autoscan.json
            echo "::error::Não foi possível desativar Automatic Analysis (HTTP $HTTP). No SonarCloud: Administration → Analysis Method → desligar Automatic Analysis."
            exit 1
          fi

      - name: SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw -B --no-transfer-progress sonar:sonar
          -Dsonar.token=$SONAR_TOKEN
          -Dsonar.organization=oswaldoschermach
          -Dsonar.projectKey=oswaldoschermach_speed-violation-service
          -Dsonar.host.url=https://sonarcloud.io

  trivy-filesystem:
    name: 6 · Trivy filesystem scan
    needs: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Scan repository (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

  docker:
    name: 7 · Docker image build
    needs: [integration-tests, trivy-filesystem, sonar]
    if: >
      github.event_name == 'push' &&
      needs.integration-tests.result == 'success' &&
      needs.trivy-filesystem.result == 'success' &&
      (needs.sonar.result == 'success' || needs.sonar.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/prod/Dockerfile
          load: true
          tags: ${{ env.IMAGE_LOCAL_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image
        run: docker save ${{ env.IMAGE_LOCAL_TAG }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-ci
          path: image.tar
          retention-days: 1

  trivy-image:
    name: 8 · Trivy image scan
    needs: docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-ci
          path: .

      - name: Load image
        run: docker load -i image.tar

      - name: Scan Docker image (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_LOCAL_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

  deploy-simulated:
    name: 9 · Deploy simulado + smoke pós-deploy
    needs: [docker, trivy-image]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-ci
          path: .

      - name: Load image
        run: docker load -i image.tar

      - name: Subir stack CI e smoke HTTP
        env:
          APP_IMAGE: ${{ env.IMAGE_LOCAL_TAG }}
        run: |
          set -euo pipefail
          docker compose -f docker/ci/compose.yaml up -d --wait
          chmod +x scripts/smoke-test-ci.sh
          BASE_URL=http://localhost:8080 ./scripts/smoke-test-ci.sh

      - name: Derrubar stack CI
        if: always()
        run: docker compose -f docker/ci/compose.yaml down -v

  publish-image:
    name: 10 · Publish image (GHCR)
    needs: deploy-simulated
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-ci
          path: .

      - name: Load scanned image
        run: docker load -i image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push (mesma imagem já escaneada)
        run: |
          set -euo pipefail
          IMAGE="${{ env.IMAGE_GHCR }}"
          docker tag ${{ env.IMAGE_LOCAL_TAG }} "${IMAGE}:latest"
          docker tag ${{ env.IMAGE_LOCAL_TAG }} "${IMAGE}:sha-${GITHUB_SHA::7}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:sha-${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            docker tag ${{ env.IMAGE_LOCAL_TAG }} "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:${VERSION}"
          fi
