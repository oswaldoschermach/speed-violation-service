name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

env:
  JAVA_VERSION: "21"
  IMAGE_LOCAL_TAG: speed-violation-service:ci
  IMAGE_GHCR: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: 1 · Build (compile)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Compile sources and test classes
        run: chmod +x mvnw && ./mvnw -B --no-transfer-progress -DskipTests compile test-compile

  unit-tests:
    name: 2 · Unit tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run unit tests (JUnit 5 + Mockito, sem Testcontainers)
        run: ./mvnw -B --no-transfer-progress test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

  smoke-tests:
    name: 3 · Smoke tests (Maven)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run smoke tests (@Tag smoke + Testcontainers)
        run: ./mvnw -B --no-transfer-progress test -Dgroups=smoke -DexcludedGroups=

  integration-tests:
    name: 4 · Integration tests + coverage gate
    needs: [unit-tests, smoke-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run integration tests (Failsafe) + JaCoCo verify gate
        run: ./mvnw -B --no-transfer-progress verify -DskipUnitTests=true

      - name: Upload JaCoCo report (HTML + XML para Sonar)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: error

      - name: Upload Failsafe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: target/failsafe-reports
          if-no-files-found: ignore

  sonar:
    name: 5 · Sonar analysis
    needs: integration-tests
    if: vars.SONAR_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Download JaCoCo XML
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Compile (sem reexecutar testes)
        run: chmod +x mvnw && ./mvnw -B -DskipTests compile test-compile

      - name: SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw -B --no-transfer-progress sonar:sonar
          -Dsonar.token=$SONAR_TOKEN
          -Dsonar.organization=oswaldoschermach
          -Dsonar.projectKey=oswaldoschermach_speed-violation-service
          -Dsonar.host.url=https://sonarcloud.io

  trivy-filesystem:
    name: 6 · Trivy filesystem scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan repository (CRITICAL/HIGH fail the build)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

  docker:
    name: 7 · Docker image build
    needs: [integration-tests, trivy-filesystem]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, ainda sem push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/prod/Dockerfile
          load: true
          tags: ${{ env.IMAGE_LOCAL_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image for jobs seguintes
        run: docker save ${{ env.IMAGE_LOCAL_TAG }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-ci
          path: image.tar
          retention-days: 1

  trivy-image:
    name: 8 · Trivy image scan
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-ci
          path: .

      - name: Load image
        run: docker load -i image.tar

      - name: Scan Docker image (CRITICAL/HIGH fail the build)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_LOCAL_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

  deploy-simulated:
    name: 9 · Deploy simulado + smoke pós-deploy
    needs: [docker, trivy-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-ci
          path: .

      - name: Load image
        run: docker load -i image.tar

      - name: Subir stack CI (app + Postgres) e smoke test HTTP
        env:
          APP_IMAGE: ${{ env.IMAGE_LOCAL_TAG }}
        run: |
          set -euo pipefail
          docker compose -f docker/ci/compose.yaml up -d --wait
          chmod +x scripts/smoke-test-ci.sh
          BASE_URL=http://localhost:8080 ./scripts/smoke-test-ci.sh

      - name: Derrubar stack CI
        if: always()
        run: docker compose -f docker/ci/compose.yaml down -v

  publish-image:
    name: 10 · Publish image (GHCR)
    needs: deploy-simulated
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_GHCR }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push (somente após todos os gates)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/prod/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
