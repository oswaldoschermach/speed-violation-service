services:
  postgres:
    image: postgres:16-alpine
    container_name: speed-violation-postgres
    environment:
      POSTGRES_DB: speed_violation
      POSTGRES_USER: speed_violation
      POSTGRES_PASSWORD: speed_violation
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speed_violation -d speed_violation"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
