server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: speed-violation-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:speed_violation}
    username: ${DB_USERNAME:speed_violation}
    password: ${DB_PASSWORD:speed_violation}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

speed-violation:
  tolerance:
    kmh-margin: ${TOLERANCE_KMH_MARGIN:7}
    percent-margin: ${TOLERANCE_PERCENT_MARGIN:7}
    percent-threshold-kmh: ${TOLERANCE_PERCENT_THRESHOLD_KMH:100}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    displayRequestDuration: true
    docExpansion: list
    defaultModelsExpandDepth: 2
    persistAuthorization: true
  show-actuator: false
