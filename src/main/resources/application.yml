spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: speed-violation-service
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

speed-violation:
  tolerance:
    kmh-margin: ${TOLERANCE_KMH_MARGIN:7}
    percent-margin: ${TOLERANCE_PERCENT_MARGIN:7}
    percent-threshold-kmh: ${TOLERANCE_PERCENT_THRESHOLD_KMH:100}
  capture:
    future-tolerance: ${CAPTURE_FUTURE_TOLERANCE:5s}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    displayRequestDuration: true
    docExpansion: list
    defaultModelsExpandDepth: 2
    persistAuthorization: true
